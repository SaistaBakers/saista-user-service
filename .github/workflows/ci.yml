name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — SonarCloud Scan (SCA)
  # All Sonar config comes from org-level secrets — no
  # sonar-project.properties file required.
  # ──────────────────────────────────────────────────────────────
  sonar-scan:
    name: SonarCloud Scan (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.sources=src
            -Dsonar.python.version=3.9
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Notify on SonarCloud failure
  # Pipeline stops here — Snyk and Docker will not run.
  # ──────────────────────────────────────────────────────────────
  notify-sonar-failure:
    name: Notify — SonarCloud Failed
    needs: sonar-scan
    if: always() && needs.sonar-scan.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send failure email
        uses: ./.github/actions/notification-action
        with:
          subject: "CI FAILED: SonarCloud Scan | ${{ github.repository }} @ ${{ github.ref_name }}"
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          recipient: ${{ secrets.SMTP_RECIPIENT }}
          body: |
            <html><body style="font-family:Arial,sans-serif;color:#333;">
            <h2 style="color:#d32f2f;">SonarCloud Scan Failed</h2>
            <p>The SonarCloud quality gate failed. The pipeline has been stopped — Snyk scan and Docker build will not proceed.</p>
            <table cellpadding="8" style="border-collapse:collapse;width:100%;border:1px solid #ddd;">
              <tr style="background:#f5f5f5;"><td><strong>Repository</strong></td><td>${{ github.repository }}</td></tr>
              <tr><td><strong>Branch</strong></td><td>${{ github.ref_name }}</td></tr>
              <tr style="background:#f5f5f5;"><td><strong>Commit SHA</strong></td><td>${{ github.sha }}</td></tr>
              <tr><td><strong>Triggered by</strong></td><td>${{ github.actor }}</td></tr>
              <tr style="background:#f5f5f5;"><td><strong>Event</strong></td><td>${{ github.event_name }}</td></tr>
              <tr><td><strong>Workflow Run</strong></td><td><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run Details</a></td></tr>
            </table>
            <p style="margin-top:16px;">Fix the SonarCloud issues and re-push to retry.</p>
            </body></html>

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Snyk Security Scan (SAST)
  # Only runs when SonarCloud passed.
  # ──────────────────────────────────────────────────────────────
  snyk-scan:
    name: Snyk Security Scan (SAST)
    needs: sonar-scan
    if: needs.sonar-scan.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk vulnerability scan
        run: snyk test --file=src/requirements.txt --severity-threshold=high --package-manager=pip
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — Notify on Snyk failure
  # Pipeline stops here — Docker build will not run.
  # ──────────────────────────────────────────────────────────────
  notify-snyk-failure:
    name: Notify — Snyk Scan Failed
    needs: [sonar-scan, snyk-scan]
    if: always() && needs.snyk-scan.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send failure email
        uses: ./.github/actions/notification-action
        with:
          subject: "CI FAILED: Snyk Security Scan | ${{ github.repository }} @ ${{ github.ref_name }}"
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          recipient: ${{ secrets.SMTP_RECIPIENT }}
          body: |
            <html><body style="font-family:Arial,sans-serif;color:#333;">
            <h2 style="color:#d32f2f;">Snyk Security Scan Failed</h2>
            <p>High or Critical severity vulnerabilities were detected in the dependencies. The pipeline has been stopped — Docker build will not proceed.</p>
            <table cellpadding="8" style="border-collapse:collapse;width:100%;border:1px solid #ddd;">
              <tr style="background:#f5f5f5;"><td><strong>Repository</strong></td><td>${{ github.repository }}</td></tr>
              <tr><td><strong>Branch</strong></td><td>${{ github.ref_name }}</td></tr>
              <tr style="background:#f5f5f5;"><td><strong>Commit SHA</strong></td><td>${{ github.sha }}</td></tr>
              <tr><td><strong>Triggered by</strong></td><td>${{ github.actor }}</td></tr>
              <tr style="background:#f5f5f5;"><td><strong>Event</strong></td><td>${{ github.event_name }}</td></tr>
              <tr><td><strong>Workflow Run</strong></td><td><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run Details</a></td></tr>
            </table>
            <p style="margin-top:16px;">Upgrade the vulnerable packages in <code>src/requirements.txt</code> and re-push to retry.</p>
            </body></html>

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — Manual Approval Gate
  # Blocked by GitHub Environment protection rules until a
  # required reviewer approves.
  #   main branch  →  'prod' environment
  #   dev  branch  →  'dev'  environment
  # Only fires on push events (not on pull_request).
  # ──────────────────────────────────────────────────────────────
  approval-gate:
    name: Manual Approval Gate
    needs: snyk-scan
    if: needs.snyk-scan.result == 'success' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Approval received
        run: |
          echo "Deployment approved for environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 6 — Docker Build & Push to GHCR
  # Runs only after a reviewer approves the gate above.
  #
  # Image tags produced:
  #   main branch → ghcr.io/<org>/saista-user-service:main-<short-sha>
  #                 ghcr.io/<org>/saista-user-service:main-latest
  #                 ghcr.io/<org>/saista-user-service:latest
  #   dev  branch → ghcr.io/<org>/saista-user-service:dev-<short-sha>
  #                 ghcr.io/<org>/saista-user-service:dev-latest
  # ──────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push to GHCR
    needs: approval-gate
    if: needs.approval-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ github.ref_name }}-,format=short
            type=raw,value=${{ github.ref_name }}-latest
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
